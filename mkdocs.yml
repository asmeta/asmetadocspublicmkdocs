site_name: AsmetaL documentation 
site_description: Asmeta documentation (for now only asmetal)
theme:
  name: material
nav:
  - Home: index.md
  - Structure of an ASM: 01-structure-of-an-asm.md
  - Domain declarations: 02_domain_declaration.md
  - Function declarations: 03_function_declarations.md
  - Terms: 04_terms.md
  - Rules: 05_transition_rules.md
  

use_directory_urls: true


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      extend_pygments_lang:
          name: asmetal
          lang: php
